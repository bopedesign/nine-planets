<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Home — 9 Planets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --dark: #25272b;
    --dark-2: #1d1f23;
    --dark-3: #2e3035;
    --light: #f7f5f3;
    --light-2: #efece8;
    --light-3: #e4e0db;
    --accent: #e4286e;
    --accent-text: #bd285a;
    --accent-on-dark: #f0ddd0;
    --accent-soft: #f7e1ea;
    --muted-dark: #8a8d92;
    --muted-light: #5a5d62;
    --rule-dark: #3a3c40;
    --rule-light: #d9d5d0;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: var(--dark);
    color: var(--light);
    font-feature-settings: 'ss01', 'cv11';
    -webkit-font-smoothing: antialiased;
    font-weight: 400;
    line-height: 1.5;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  img { max-width: 100%; display: block; }

  .wrap {
    max-width: 1680px;
    margin: 0 auto;
    padding: 0 56px;
  }

  .eyebrow {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent-text);
  }
  .eyebrow[data-on="dark"] { color: var(--accent-on-dark); }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 22px;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.02em;
    border-radius: 2px;
    transition: all .18s ease;
  }
  .btn-primary { background: var(--dark); color: var(--light); }
  .btn-primary:hover { background: #000; }
  .btn-light { background: var(--light); color: var(--dark); }
  .btn-light:hover { background: #fff; }
  .btn-ghost-dark { border: 1px solid var(--rule-dark); color: var(--light); background: transparent; }
  .btn-ghost-dark:hover { border-color: var(--accent); color: var(--accent); }
  .btn-outline { border: 1px solid var(--dark); color: var(--dark); background: transparent; }
  .btn-outline:hover { background: var(--dark); color: var(--light); }
  .btn .arrow { display: inline-block; transition: transform .18s ease; }
  .btn:hover .arrow { transform: translateX(3px); }
</style>
</head>
<body data-screen-label="Home">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="components/HomeHero.jsx"></script>
  <script type="text/babel" src="components/HomeArchitecture.jsx"></script>
  <script type="text/babel" src="components/HomeServices.jsx"></script>
  <script type="text/babel" src="components/HomeReviews.jsx"></script>
  <script type="text/babel" src="components/HomeBlog.jsx"></script>
  <script type="text/babel" src="components/HomeCTA.jsx"></script>
  <script type="text/babel" src="components/Footer.jsx"></script>
  <script type="text/babel">
    const App = () => (
      <>
        <HomeHero />
        <HomeArchitecture />
        <HomeServices />
        <HomeReviews />
        <HomeBlog />
        <HomeCTA />
        <Footer />
      </>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
